name: Alerts

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord webhook alert
        env:
          WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if [ -z "${WEBHOOK_URL:-}" ]; then
            echo "Secret ALERT_WEBHOOK_URL nao configurada. Configure em Settings -> Secrets and variables -> Actions."
            exit 0
          fi

          export MESSAGE="Repositorio: ${{ github.repository }} | Evento: ${{ github.event_name }} | Branch: ${{ github.ref_name }} | Workflow: ${{ github.workflow }} | Run: ${{ github.run_id }}"
          PAYLOAD="$(python -c 'import json, os; print(json.dumps({"content": os.environ["MESSAGE"]}))')"

          curl --fail-with-body -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"
