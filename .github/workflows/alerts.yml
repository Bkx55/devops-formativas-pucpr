name: Alerts

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build alert message
        id: msg
        run: |
          echo "text=Repositorio: ${{ github.repository }} | Evento: ${{ github.event_name }} | Branch: ${{ github.ref_name }} | Status: workflow executado" >> "$GITHUB_OUTPUT"

      - name: Send webhook alert
        if: ${{ secrets.ALERT_WEBHOOK_URL != '' }}
        run: |
          curl -X POST \
          -H "Content-Type: application/json" \
          -d "{\"content\":\"${{ steps.msg.outputs.text }}\"}" \
          "${{ secrets.ALERT_WEBHOOK_URL }}"

      - name: Skip when webhook is missing
        if: ${{ secrets.ALERT_WEBHOOK_URL == '' }}
        run: echo "Secret ALERT_WEBHOOK_URL nao configurada. Configure para enviar alertas."
